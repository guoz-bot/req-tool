<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>需求管控工具</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#165DFF',
                        partyA: '#FF7D00',
                        neutral: '#F5F7FA'
                    },
                }
            }
        }
    </script>
</head>
<body class="bg-neutral min-h-screen">
    <div class="max-w-7xl mx-auto px-4 py-8">
        <div class="text-center mb-6">
            <h1 class="text-[26px] font-bold text-gray-800">需求管控工具</h1>
            
        </div>

        <!-- 统计栏 -->
        <div class="bg-white rounded-lg p-4 mb-4 shadow flex flex-col md:flex-row gap-4 justify-between items-center">
            <div class="text-sm text-gray-600">
                总需求：<span id="statTotal" class="font-bold">0</span> 
                已下发：<span id="statPublish" class="text-green-600 font-bold">0</span>
                待判定：<span id="statWait" class="text-orange-500 font-bold">0</span>
            </div>
        </div>

        <!-- 操作栏 -->
        <div class="bg-white rounded-lg p-4 shadow-sm mb-6 flex flex-wrap md:flex-nowrap items-center gap-3">
            <div class="flex gap-3 flex-nowrap">
                <button onclick="openAddModal()" class="bg-primary text-white px-6 py-2 rounded whitespace-nowrap text-base">
                    <i class="fa fa-plus mr-1"></i> 新增需求
                </button>
                <button onclick="exportExcel()" class="bg-green-600 text-white px-6 py-2 rounded whitespace-nowrap text-base">
                    <i class="fa fa-download mr-1"></i> 导出Excel
                </button>
            </div>

            <div class="flex gap-2 ml-auto">
                <input type="text" id="searchInput" placeholder="搜索关键词..." class="px-3 py-2 rounded w-64 border border-gray-200">
                <button onclick="render()" class="bg-primary text-white px-4 py-2 rounded whitespace-nowrap">
                    <i class="fa fa-search mr-1"></i> 搜索
                </button>
            </div>
        </div>

        <!-- 表格 -->
        <div class="bg-white rounded-lg overflow-hidden shadow">
            <table class="w-full text-sm text-left">
                <thead class="bg-gray-100 text-gray-700">
                    <tr>
                        <th class="px-3 py-3">序号</th>
                        <th class="px-3 py-3">需求内容</th>
                        <th class="px-3 py-3">功能点</th>
                        <th class="px-3 py-3">费用出处</th>
                        <th class="px-3 py-3">上线日期</th>
                        <th class="px-3 py-3">优先级</th>
                        <th class="px-3 py-3">当前状态</th>
                        <th class="px-3 py-3 text-partyA">是否下发</th>
                        <th class="px-3 py-3">备注</th>
                        <th class="px-3 py-3">操作</th>
                    </tr>
                </thead>
                <tbody id="tableBody" class="divide-y divide-gray-100"></tbody>
            </table>
        </div>
    </div>

    <!-- 弹窗 -->
    <div id="modal" class="fixed inset-0 bg-black/40 hidden z-50 flex justify-center items-center">
        <div class="bg-white rounded-lg w-full max-w-2xl max-h-[90vh] overflow-y-auto p-6">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-xl font-bold" id="modalTitle">新增需求</h2>
                <button onclick="closeModal()" class="text-xl">&times;</button>
            </div>
            <form id="form" class="space-y-4">
                <input type="hidden" id="editId">
                
                <div>
                    <label class="block mb-1">需求内容 <span class="text-red-500">*</span></label>
                    <textarea id="content" rows="2" class="w-full border p-2 rounded" required></textarea>
                </div>

                <div>
                    <label class="block mb-1">功能点</label>
                    <textarea id="feature" rows="2" class="w-full border p-2 rounded"></textarea>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label class="block mb-1">费用出处</label>
                        <input type="text" id="costSource" class="w-full border p-2 rounded">
                    </div>
                    <div>
                        <label class="block mb-1">上线日期</label>
                        <input type="date" id="onlineDate" class="w-full border p-2 rounded">
                    </div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label class="block mb-1">优先级</label>
                        <select id="priority" class="w-full border p-2 rounded">
                            <option>中</option>
                            <option>高</option>
                            <option>低</option>
                        </select>
                    </div>
                    <div>
                        <label class="block mb-1">当前状态</label>
                        <select id="status" class="w-full border p-2 rounded">
                            <option>待开发</option>
                            <option>开发中</option>
                            <option>测试中</option>
                            <option>已上线</option>
                            <option>已取消</option>
                        </select>
                    </div>
                </div>

                <div>
                    <label class="block mb-1">负责人</label>
                    <input type="text" id="owner" class="w-full border p-2 rounded">
                </div>

                <div>
                    <label class="block mb-1 text-partyA">是否判定下发</label>
                    <select id="isPublish" class="w-full border p-2 rounded">
                        <option value="待判定">待判定</option>
                        <option value="已下发">已下发</option>
                        <option value="不通过">不通过</option>
                    </select>
                </div>

                <div>
                    <label class="block mb-1">备注</label>
                    <textarea id="remark" rows="2" class="w-full border p-2 rounded"></textarea>
                </div>

                <div class="flex justify-end gap-3 pt-2">
                    <button type="button" onclick="closeModal()" class="px-4 py-2 bg-gray-200 rounded">取消</button>
                    <button type="submit" class="px-4 py-2 bg-primary text-white rounded">保存</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        let dataList = [];

        // 初始化数据
        function initData() {
            try {
                const local = localStorage.getItem('req_data_v3');
                dataList = local ? JSON.parse(local) : [];
                if (!Array.isArray(dataList)) dataList = [];
            } catch (e) {
                dataList = [];
            }
        }

        // 保存到本地
        function saveData() {
            localStorage.setItem('req_data_v3', JSON.stringify(dataList));
        }

        // 渲染表格 + 搜索
        function render() {
            const tbody = document.getElementById('tableBody');
            const kw = (document.getElementById('searchInput').value || '').toLowerCase();
            tbody.innerHTML = '';

            const list = dataList.filter(item => {
                const c = (item.content || '').toLowerCase();
                const f = (item.feature || '').toLowerCase();
                const r = (item.remark || '').toLowerCase();
                return c.includes(kw) || f.includes(kw) || r.includes(kw);
            });

            document.getElementById('statTotal').textContent = list.length;
            document.getElementById('statPublish').textContent = list.filter(i => i.isPublish === '已下发').length;
            document.getElementById('statWait').textContent = list.filter(i => i.isPublish === '待判定').length;

            list.forEach((item, idx) => {
                const tr = document.createElement('tr');
                tr.className = 'hover:bg-gray-50';
                tr.innerHTML = `
                    <td class="px-3 py-3">${idx + 1}</td>
                    <td class="px-3 py-3 max-w-[200px]">${item.content || '-'}</td>
                    <td class="px-3 py-3 max-w-[200px]">${item.feature || '-'}</td>
                    <td class="px-3 py-3">${item.costSource || '-'}</td>
                    <td class="px-3 py-3">${item.onlineDate || '-'}</td>
                    <td class="px-3 py-3">${item.priority || '中'}</td>
                    <td class="px-3 py-3">${item.status || '待开发'}</td>
                    <td class="px-3 py-3 font-bold ${item.isPublish === '已下发' ? 'text-green-600' : item.isPublish === '不通过' ? 'text-red-600' : 'text-orange-500'}">
                        ${item.isPublish || '待判定'}
                    </td>
                    <td class="px-3 py-3 max-w-[180px]">${item.remark || '-'}</td>
                    <td class="px-3 py-3">
                        <button onclick="editItem('${item.id}')" class="text-blue-500 mr-2"><i class="fa fa-edit"></i></button>
                        <button onclick="delItem('${item.id}')" class="text-red-500"><i class="fa fa-trash"></i></button>
                    </td>
                `;
                tbody.appendChild(tr);
            });
        }

        // 打开新增
        function openAddModal() {
            document.getElementById('form').reset();
            document.getElementById('editId').value = '';
            document.getElementById('modalTitle').innerText = '新增需求';
            document.getElementById('modal').classList.remove('hidden');
        }

        // 编辑
        function editItem(id) {
            const item = dataList.find(i => i.id === id);
            if (!item) return;
            document.getElementById('editId').value = item.id;
            document.getElementById('modalTitle').innerText = '编辑需求';
            document.getElementById('content').value = item.content || '';
            document.getElementById('feature').value = item.feature || '';
            document.getElementById('costSource').value = item.costSource || '';
            document.getElementById('onlineDate').value = item.onlineDate || '';
            document.getElementById('priority').value = item.priority || '中';
            document.getElementById('status').value = item.status || '待开发';
            document.getElementById('owner').value = item.owner || '';
            document.getElementById('isPublish').value = item.isPublish || '待判定';
            document.getElementById('remark').value = item.remark || '';
            document.getElementById('modal').classList.remove('hidden');
        }

        // 删除
        function delItem(id) {
            if (!confirm('确定删除该需求？删除后无法恢复！')) return;
            dataList = dataList.filter(i => i.id !== id);
            saveData();
            render();
        }

        // 关闭弹窗
        function closeModal() {
            document.getElementById('modal').classList.add('hidden');
        }

        // 提交保存（已彻底修复）
        document.getElementById('form').addEventListener('submit', function (e) {
            e.preventDefault();
            const editId = document.getElementById('editId').value;
            
            const data = {
                id: editId || 'REQ_' + Date.now(),
                content: (document.getElementById('content').value || '').trim(),
                feature: (document.getElementById('feature').value || '').trim(),
                costSource: (document.getElementById('costSource').value || '').trim(),
                onlineDate: document.getElementById('onlineDate').value,
                priority: document.getElementById('priority').value,
                status: document.getElementById('status').value,
                owner: (document.getElementById('owner').value || '').trim(),
                isPublish: document.getElementById('isPublish').value,
                remark: (document.getElementById('remark').value || '').trim()
            };

            const index = dataList.findIndex(i => i.id === editId);
            if (index >= 0) {
                dataList[index] = data;
            } else {
                dataList.push(data);
            }
            
            saveData();
            closeModal();
            render();
        });

        // 导出Excel
        function exportExcel() {
            const exp = dataList.map((it, i) => ({
                '序号': i + 1,
                '需求内容': it.content || '-',
                '功能点': it.feature || '-',
                '费用出处': it.costSource || '-',
                '上线日期': it.onlineDate || '-',
                '优先级': it.priority || '-',
                '状态': it.status || '-',
                '是否下发': it.isPublish || '-',
                '负责人': it.owner || '-',
                '备注': it.remark || '-'
            }));
            const ws = XLSX.utils.json_to_sheet(exp);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, '需求清单');
            XLSX.writeFile(wb, '需求管控清单.xlsx');
        }

        // 启动
        initData();
        render();
    </script>
</body>
</html>
